server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Cache static assets
    location /_next/static {
        alias /usr/share/nginx/html/static;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Serve public assets (partners, images, etc.)
    location /partners/ {
        alias /usr/share/nginx/html/partners/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Serve favicon and icons directly
    location = /favicon.ico {
        alias /usr/share/nginx/html/favicon.ico;
        expires 7d;
        add_header Cache-Control "public";
    }

    location = /icon-192.png {
        alias /usr/share/nginx/html/icon-192.png;
        expires 7d;
        add_header Cache-Control "public";
    }

    location = /icon-512.png {
        alias /usr/share/nginx/html/icon-512.png;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Handle Next.js routing - serve from server/app folder
    location / {
        root /usr/share/nginx/html/server/app;
        try_files $uri $uri.html $uri/index.html /index.html;
    }

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /500.html;
}
